<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lerd</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            lerd: {
              red:    '#FF2D20',
              redhov: '#e02419',
              bg:     '#0d0d0d',
              card:   '#161616',
              border: '#262626',
              muted:  '#404040',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #333; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-lerd-bg text-gray-900 dark:text-gray-100 min-h-screen font-sans antialiased" x-data="lerdApp()" x-init="init()" x-cloak>

  <!-- Top Navbar -->
  <nav class="border-b border-gray-200 dark:border-lerd-border bg-white/95 dark:bg-lerd-bg/95 backdrop-blur sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between h-14">

        <!-- Logo + version -->
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2.5">
            <svg class="w-6 h-6 text-lerd-red" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span class="font-bold text-gray-900 dark:text-white tracking-tight text-lg">Lerd</span>
            <span class="text-xs text-gray-400 dark:text-gray-600 font-mono" x-text="'v' + version.current"></span>
          </div>

          <!-- Nav tabs -->
          <div class="flex items-center gap-1">
            <button
              @click="tab = 'sites'"
              :class="tab === 'sites' ? 'text-gray-900 dark:text-white bg-gray-100 dark:bg-white/10' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/5'"
              class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            >Sites</button>
            <button
              @click="tab = 'services'"
              :class="tab === 'services' ? 'text-gray-900 dark:text-white bg-gray-100 dark:bg-white/10' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/5'"
              class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            >Services</button>
            <button
              @click="tab = 'system'"
              :class="tab === 'system' ? 'text-gray-900 dark:text-white bg-gray-100 dark:bg-white/10' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/5'"
              class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            >System</button>
          </div>
        </div>

        <!-- Right side: update controls -->
        <div class="flex items-center gap-3">
          <!-- Theme toggle -->
          <div class="flex items-center rounded-md border border-gray-200 dark:border-lerd-border overflow-hidden text-xs">
            <template x-for="m in ['light','auto','dark']" :key="m">
              <button
                @click="setTheme(m)"
                :class="theme === m ? 'bg-gray-200 dark:bg-white/10 text-gray-900 dark:text-white' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'"
                class="px-2.5 py-1 capitalize transition-colors"
                x-text="m"
              ></button>
            </template>
          </div>

          <template x-if="!version.checked">
            <button
              @click="checkVersion()"
              :disabled="version.checking"
              class="text-xs text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors disabled:opacity-40"
            >
              <span x-show="!version.checking">Check for updates</span>
              <span x-show="version.checking">Checking...</span>
            </button>
          </template>

          <template x-if="version.checked && !version.hasUpdate">
            <span class="text-xs text-emerald-600 dark:text-emerald-500 flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              Up to date
            </span>
          </template>

          <template x-if="version.checked && version.hasUpdate">
            <div class="flex items-center gap-2">
              <span class="text-xs text-yellow-600 dark:text-yellow-400" x-text="version.latest + ' available'"></span>
              <span class="text-xs text-gray-500 dark:text-gray-400">— run <code class="font-mono bg-gray-100 dark:bg-white/10 px-1 rounded">lerd update</code> in a terminal</span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- ===== SITES TAB ===== -->
    <div x-show="tab === 'sites'">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Sites</h2>
          <p class="text-sm text-gray-500 mt-0.5">Manage your registered Laravel sites</p>
        </div>
        <button
          @click="loadSites()"
          class="text-xs text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 border border-gray-200 dark:border-lerd-border hover:border-gray-300 dark:hover:border-lerd-muted rounded-md px-3 py-1.5 transition-colors"
        >Refresh</button>
      </div>

      <template x-if="sitesLoading">
        <div class="text-sm text-gray-400">Loading sites...</div>
      </template>

      <template x-if="!sitesLoading && sites.length === 0">
        <div class="border border-gray-200 dark:border-lerd-border rounded-xl p-12 text-center">
          <div class="w-12 h-12 rounded-full bg-gray-100 dark:bg-lerd-card border border-gray-200 dark:border-lerd-border flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg>
          </div>
          <p class="text-sm text-gray-500 mb-1">No sites registered yet</p>
          <p class="text-xs text-gray-400">Run <code class="bg-gray-100 dark:bg-lerd-card border border-gray-200 dark:border-lerd-border px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-400">lerd park</code> or <code class="bg-gray-100 dark:bg-lerd-card border border-gray-200 dark:border-lerd-border px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-400">lerd link</code> to add sites</p>
        </div>
      </template>

      <template x-if="!sitesLoading && sites.length > 0">
        <div class="rounded-xl border border-gray-200 dark:border-lerd-border overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-200 dark:border-lerd-border bg-gray-50 dark:bg-transparent">
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Domain</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Path</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">PHP</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Node</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">HTTPS</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Queue</th>
                <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="bg-white dark:bg-transparent">
              <template x-for="site in sites" :key="site.domain">
                <tr
                  class="border-b border-gray-100 dark:border-lerd-border last:border-0 transition-colors cursor-pointer"
                  :class="logs.container === fpmContainer(site) && logs.open ? 'bg-red-50 dark:bg-lerd-red/5' : 'hover:bg-gray-50 dark:hover:bg-white/[0.02]'"
                  @click="openLogs(site)"
                  title="Click to view live PHP-FPM logs"
                >
                  <td class="px-5 py-3.5">
                    <a
                      :href="(site.tls ? 'https://' : 'http://') + site.domain"
                      @click.prevent.stop="openSite(site)"
                      class="text-lerd-red hover:text-lerd-redhov font-medium transition-colors"
                      x-text="site.domain"
                    ></a>
                  </td>
                  <td class="px-5 py-3.5 text-gray-500 font-mono text-xs truncate max-w-xs" x-text="site.path"></td>
                  <td class="px-5 py-3.5" @click.stop>
                    <select
                      x-model="site.php_version"
                      @change="setSiteVersion(site, 'php', site.php_version)"
                      class="text-xs bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded px-2 py-1 text-gray-700 dark:text-gray-300 hover:border-gray-300 dark:hover:border-lerd-muted focus:outline-none focus:border-lerd-red/50 disabled:opacity-50 cursor-pointer transition-colors"
                      :disabled="site.versionLoading"
                    >
                      <option value="" disabled>—</option>
                      <template x-for="v in phpVersions" :key="v">
                        <option :value="v" x-text="'PHP ' + v"></option>
                      </template>
                    </select>
                  </td>
                  <td class="px-5 py-3.5" @click.stop>
                    <select
                      x-model="site.node_version"
                      @change="setSiteVersion(site, 'node', site.node_version)"
                      class="text-xs bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded px-2 py-1 text-gray-700 dark:text-gray-300 hover:border-gray-300 dark:hover:border-lerd-muted focus:outline-none focus:border-lerd-red/50 disabled:opacity-50 cursor-pointer transition-colors"
                      :disabled="site.versionLoading"
                    >
                      <option value="" disabled>—</option>
                      <template x-for="v in nodeVersions" :key="v">
                        <option :value="v" x-text="'Node ' + v"></option>
                      </template>
                    </select>
                  </td>
                  <td class="px-5 py-3.5" @click.stop>
                    <div class="flex flex-col items-start gap-1">
                      <button
                        @click="toggleTLS(site)"
                        :disabled="site.tlsLoading"
                        :title="site.tls ? 'Disable HTTPS' : 'Enable HTTPS'"
                        class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-200 focus:outline-none disabled:opacity-50"
                        :class="site.tls ? 'bg-lerd-red' : 'bg-gray-300 dark:bg-lerd-muted'"
                      >
                        <span
                          class="inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-200"
                          :class="site.tls ? 'translate-x-4' : 'translate-x-1'"
                        ></span>
                        <svg x-show="site.tlsLoading" class="animate-spin absolute right-[-18px] w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                        </svg>
                      </button>
                      <div x-show="site.tlsError" class="text-[10px] text-red-500" x-text="site.tlsError"></div>
                    </div>
                  </td>
                  <td class="px-5 py-3.5">
                    <template x-if="site.fpm_running">
                      <span class="inline-flex items-center gap-1.5 text-xs font-medium text-emerald-600 dark:text-emerald-500">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>running
                      </span>
                    </template>
                    <template x-if="!site.fpm_running">
                      <span class="inline-flex items-center gap-1.5 text-xs font-medium text-red-500">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>stopped
                      </span>
                    </template>
                  </td>
                  <td class="px-5 py-3.5" @click.stop>
                    <div class="flex flex-col items-start gap-1">
                      <div class="flex items-center gap-2">
                        <button
                          @click="toggleQueue(site)"
                          :disabled="site.queueLoading"
                          :title="site.queue_running ? 'Stop queue worker' : 'Start queue worker'"
                          class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-200 focus:outline-none disabled:opacity-50"
                          :class="site.queue_running ? 'bg-amber-500' : 'bg-gray-300 dark:bg-lerd-muted'"
                        >
                          <span
                            class="inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-200"
                            :class="site.queue_running ? 'translate-x-4' : 'translate-x-1'"
                          ></span>
                          <svg x-show="site.queueLoading" class="animate-spin absolute right-[-18px] w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                          </svg>
                        </button>
                        <button
                          x-show="site.queue_running"
                          @click="openQueueLogs(site)"
                          class="text-xs text-amber-600 dark:text-amber-400 hover:underline"
                          title="View queue worker logs"
                        >logs</button>
                      </div>
                      <div x-show="site.queueError" class="text-[10px] text-red-500" x-text="site.queueError"></div>
                    </div>
                  </td>
                  <td class="px-5 py-3.5" @click.stop>
                    <button
                      @click="unlinkSite(site)"
                      :disabled="site.unlinkLoading"
                      class="text-xs border border-red-300 dark:border-red-700 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded px-2 py-1 transition-colors disabled:opacity-50"
                    >
                      <span x-show="!site.unlinkLoading">Unlink</span>
                      <span x-show="site.unlinkLoading">...</span>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
    </div>

    <!-- ===== SERVICES TAB ===== -->
    <div x-show="tab === 'services'">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Services</h2>
          <p class="text-sm text-gray-500 mt-0.5">Databases, caches and other infrastructure</p>
        </div>
      </div>

      <template x-if="servicesLoading">
        <div class="text-sm text-gray-400">Loading services...</div>
      </template>

      <template x-if="!servicesLoading">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          <template x-for="svc in services" :key="svc.name">
            <div
              class="bg-white dark:bg-lerd-card rounded-xl border p-5 flex flex-col gap-4 transition-colors"
              :class="svc.error ? 'border-red-300 dark:border-red-500/30' : 'border-gray-200 dark:border-lerd-border'"
            >
              <!-- Name + status -->
              <div class="flex items-center justify-between">
                <span class="font-semibold text-gray-900 dark:text-white" x-text="capitalize(svc.name)"></span>
                <span
                  class="inline-flex items-center gap-1.5 text-xs font-medium px-2 py-0.5 rounded-full"
                  :class="svc.status === 'active'
                    ? 'bg-emerald-100 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-500'
                    : 'bg-gray-100 dark:bg-white/5 text-gray-500'"
                >
                  <span class="w-1.5 h-1.5 rounded-full" :class="svc.status === 'active' ? 'bg-emerald-500' : 'bg-gray-400 dark:bg-gray-600'"></span>
                  <span x-text="svc.status"></span>
                </span>
              </div>

              <!-- Action buttons -->
              <div class="flex gap-2 mt-auto">
                <template x-if="svc.status !== 'active'">
                  <button
                    @click="toggleService(svc, 'start')"
                    :disabled="svc.loading"
                    class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium bg-lerd-red hover:bg-lerd-redhov text-white rounded-lg px-3 py-1.5 transition-colors disabled:opacity-50"
                  >
                    <svg x-show="svc.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                    </svg>
                    <span x-show="!svc.loading">Start</span>
                  </button>
                </template>
                <template x-if="svc.status === 'active'">
                  <button
                    @click="toggleService(svc, 'stop')"
                    :disabled="svc.loading"
                    class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-lerd-border rounded-lg px-3 py-1.5 transition-colors disabled:opacity-50"
                  >
                    <svg x-show="svc.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                    </svg>
                    <span x-show="!svc.loading">Stop</span>
                  </button>
                </template>

                <button
                  @click="svc.showEnv = !svc.showEnv"
                  class="text-xs font-medium bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-lerd-border rounded-lg px-3 py-1.5 transition-colors"
                  :title="'Toggle .env vars for ' + svc.name"
                  x-text="svc.showEnv ? 'Hide' : '.env'"
                ></button>

                <template x-if="svc.status === 'active' && serviceDashboard(svc.name)">
                  <a
                    :href="serviceDashboard(svc.name)"
                    target="_blank"
                    class="flex items-center gap-1 text-xs font-medium bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-lerd-border rounded-lg px-3 py-1.5 transition-colors"
                    title="Open dashboard"
                  >
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                  </a>
                </template>
              </div>

              <!-- Env vars preview -->
              <div x-show="svc.showEnv" class="rounded-lg border border-gray-200 dark:border-lerd-border overflow-hidden">
                <div class="flex items-center justify-between bg-gray-50 dark:bg-white/[0.03] px-3 py-1.5 border-b border-gray-200 dark:border-lerd-border">
                  <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">.env</span>
                  <button
                    @click="copyEnvVars(svc)"
                    class="text-[10px] font-medium text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
                  >
                    <span x-show="!svc.copied">Copy</span>
                    <span x-show="svc.copied" class="text-emerald-600 dark:text-emerald-500">Copied!</span>
                  </button>
                </div>
                <pre class="bg-gray-50 dark:bg-black/40 text-gray-600 dark:text-gray-400 px-3 py-2.5 text-[10px] leading-relaxed overflow-x-auto whitespace-pre" x-text="envPreview(svc)"></pre>
              </div>

              <!-- Flash / error -->
              <div x-show="svc.flash" class="text-xs text-center text-emerald-700 dark:text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 rounded-lg px-2 py-1.5" x-text="svc.flash"></div>

              <template x-if="svc.error">
                <div class="space-y-1.5">
                  <div class="text-xs font-medium text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-500/10 rounded-lg px-3 py-1.5" x-text="svc.error"></div>
                  <template x-if="svc.logs">
                    <details class="text-xs">
                      <summary class="cursor-pointer text-gray-500 hover:text-gray-700 dark:hover:text-gray-400 px-1">Show logs</summary>
                      <pre class="mt-1.5 bg-gray-100 dark:bg-black/60 text-gray-600 dark:text-gray-400 rounded-lg p-3 overflow-x-auto text-[10px] leading-relaxed whitespace-pre-wrap" x-text="svc.logs"></pre>
                    </details>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Install Node version -->
      <div class="mt-8 pt-6 border-t border-gray-200 dark:border-lerd-border">
        <h3 class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-3">Install Node version</h3>
        <div class="flex items-center gap-2">
          <input
            type="text"
            x-model="nodeInstall.version"
            @keydown.enter="installNodeVersion()"
            placeholder="e.g. 22"
            class="text-sm bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded-lg px-3 py-1.5 w-28 text-gray-700 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:border-lerd-red/50 transition-colors"
            :disabled="nodeInstall.installing"
          >
          <button
            @click="installNodeVersion()"
            :disabled="nodeInstall.installing || !nodeInstall.version.trim()"
            class="text-sm bg-lerd-red hover:bg-lerd-redhov text-white rounded-lg px-4 py-1.5 transition-colors disabled:opacity-40 flex items-center gap-1.5 font-medium"
          >
            <svg x-show="nodeInstall.installing" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            <span x-text="nodeInstall.installing ? 'Installing...' : 'Install'"></span>
          </button>
          <span x-show="nodeInstall.done" class="text-sm text-emerald-600 dark:text-emerald-500">Installed!</span>
          <span x-show="nodeInstall.error" class="text-sm text-red-500" x-text="nodeInstall.error"></span>
        </div>
      </div>
    </div>

    <!-- ===== SYSTEM TAB ===== -->
    <div x-show="tab === 'system'">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-semibold text-gray-900 dark:text-white">System</h2>
          <p class="text-sm text-gray-500 mt-0.5">Infrastructure health — auto-refreshes every 10 seconds</p>
        </div>
      </div>

      <template x-if="statusLoading">
        <div class="text-sm text-gray-400">Loading system status...</div>
      </template>

      <template x-if="!statusLoading">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

          <!-- DNS card -->
          <div class="bg-white dark:bg-lerd-card rounded-xl border border-gray-200 dark:border-lerd-border p-5">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-white/5 flex items-center justify-center">
                  <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg>
                </div>
                <h3 class="font-semibold text-gray-900 dark:text-white">DNS</h3>
              </div>
              <template x-if="systemStatus.dns && systemStatus.dns.ok">
                <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-emerald-100 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-500 px-2.5 py-1 rounded-full">
                  <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>OK

                <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-red-100 dark:bg-red-500/10 text-red-600 dark:text-red-400 px-2.5 py-1 rounded-full">

            <p class="text-sm text-gray-500">
              TLD: <code class="bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-lerd-border px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-400 text-xs" x-text="'.' + (systemStatus.dns ? systemStatus.dns.tld : 'test')"></code>

            <template x-if="!systemStatus.dns || !systemStatus.dns.ok">

          <!-- Nginx card -->
          <div class="bg-white dark:bg-lerd-card rounded-xl border border-gray-200 dark:border-lerd-border p-5">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2.5">

                  <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>
                </div>
                <h3 class="font-semibold text-gray-900 dark:text-white">Nginx</h3>
              </div>
              <template x-if="systemStatus.nginx && systemStatus.nginx.running">
                <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-emerald-100 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-500 px-2.5 py-1 rounded-full">
                  <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Running
                </span>
              </template>
              <template x-if="!systemStatus.nginx || !systemStatus.nginx.running">
                <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-red-100 dark:bg-red-500/10 text-red-600 dark:text-red-400 px-2.5 py-1 rounded-full">
                  <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Stopped
                </span>
              </template>
            </div>
            <p class="text-sm text-gray-500">Container: <code class="bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-lerd-border px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-400 text-xs">lerd-nginx</code></p>
          </div>

          <!-- PHP FPM card -->
          <div class="bg-white dark:bg-lerd-card rounded-xl border border-gray-200 dark:border-lerd-border p-5">
            <div class="flex items-center gap-2.5 mb-4">
              <div class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-white/5 flex items-center justify-center">
                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
              </div>
              <h3 class="font-semibold text-gray-900 dark:text-white">PHP-FPM</h3>
            </div>
            <div x-show="phpVersions.length === 0">
              <p class="text-sm text-gray-500">No PHP versions installed.</p>
              <p class="text-xs text-gray-400 mt-1">Run <code class="bg-gray-100 dark:bg-white/5 px-1 rounded text-gray-500">lerd use 8.4</code> to install.</p>
            </div>
            <div x-show="phpVersions.length > 0" class="space-y-2.5">
              <template x-for="v in phpVersions" :key="v">
                <div class="flex items-center justify-between gap-3">
                  <span class="text-sm text-gray-500 shrink-0">PHP <span x-text="v" class="text-gray-700 dark:text-gray-300 font-medium"></span></span>
                  <div class="flex items-center gap-3 ml-auto">
                    <!-- Xdebug toggle -->
                    <div class="flex items-center gap-1.5">
                      <span class="text-[10px] text-gray-400">Xdebug</span>
                      <button
                        type="button"
                        @click.prevent="toggleXdebug(v)"
                        class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer items-center rounded-full transition-colors duration-200 focus:outline-none"
                        :class="xdebugEnabled[v] ? 'bg-purple-500' : 'bg-gray-300 dark:bg-lerd-muted'"
                        :title="xdebugEnabled[v] ? 'Disable Xdebug' : 'Enable Xdebug (rebuilds image)'"
                      >
                        <span
                          class="inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-200"
                          :class="xdebugEnabled[v] ? 'translate-x-4' : 'translate-x-1'"
                        ></span>
                      </button>
                      <svg x-show="xdebugLoading[v]" style="display:none" class="animate-spin w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                      </svg>
                    </div>
                    <!-- Running status -->
                    <span x-show="fpmRunning(v)" class="inline-flex items-center gap-1.5 text-xs text-emerald-600 dark:text-emerald-500" style="display:none">
                      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>running
                    </span>
                    <span x-show="!fpmRunning(v)" class="inline-flex items-center gap-1.5 text-xs text-red-500">
                      <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>stopped
                    </span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Autostart card -->
          <div class="bg-white dark:bg-lerd-card rounded-xl border border-gray-200 dark:border-lerd-border p-5">
            <div class="flex items-center gap-2.5 mb-4">
              <div class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-white/5 flex items-center justify-center">
                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              </div>
              <h3 class="font-semibold text-gray-900 dark:text-white">Autostart</h3>
            </div>
            <div class="flex items-center justify-between">
              <p class="text-sm text-gray-500">Start on login</p>
              <button
                @click="toggleAutostart()"
                :disabled="autostartLoading"
                :title="autostartEnabled ? 'Disable autostart' : 'Enable autostart'"
                class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full transition-colors duration-200 focus:outline-none disabled:opacity-50"
                :class="autostartEnabled ? 'bg-lerd-red' : 'bg-gray-300 dark:bg-lerd-muted'"
              >
                <span
                  class="inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform duration-200"
                  :class="autostartEnabled ? 'translate-x-4' : 'translate-x-1'"
                ></span>
              </button>
            </div>
            <p class="text-xs text-gray-400 mt-2">When enabled, lerd starts automatically on every login.</p>
          </div>

        </div>
      </template>
    </div>

  </main>

  <!-- Live logs drawer (fixed bottom) -->
  <div
    x-show="logs.open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="translate-y-full opacity-0"
    x-transition:enter-end="translate-y-0 opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="translate-y-0 opacity-100"
    x-transition:leave-end="translate-y-full opacity-0"
    class="fixed bottom-0 left-0 right-0 h-72 bg-white dark:bg-black border-t border-gray-200 dark:border-lerd-border flex flex-col z-50"
    style="display:none"
  >
    <!-- Drawer header -->
    <div class="flex items-center justify-between px-5 py-2.5 border-b border-gray-200 dark:border-lerd-border shrink-0 bg-gray-50 dark:bg-transparent">
      <div class="flex items-center gap-3">
        <span class="text-xs font-semibold text-gray-600 dark:text-gray-400 font-mono" x-text="logs.container"></span>
        <span class="flex items-center gap-1.5 text-[10px]" :class="logs.connected ? 'text-emerald-600 dark:text-emerald-500' : 'text-gray-400 dark:text-gray-600'">
          <span class="w-1.5 h-1.5 rounded-full" :class="logs.connected ? 'bg-emerald-500 animate-pulse' : 'bg-gray-400 dark:bg-gray-600'"></span>
          <span x-text="logs.connected ? 'live' : 'disconnected'"></span>
        </span>
      </div>
      <div class="flex items-center gap-4">
        <button @click="clearLogs()" class="text-[10px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-400 transition-colors">Clear</button>
        <button @click="closeLogs()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-400 transition-colors" title="Close">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Log lines -->
    <div class="flex-1 overflow-y-auto px-5 py-3 font-mono text-[11px] leading-relaxed text-gray-500 space-y-0.5 bg-gray-50 dark:bg-transparent" x-ref="logScroll">
      <template x-if="logs.lines.length === 0">
        <div class="text-gray-400 dark:text-gray-700 italic">Waiting for log output...</div>
      </template>
      <template x-for="(line, i) in logs.lines" :key="i">
        <div
          class="whitespace-pre-wrap break-all"
          :class="{
            'text-red-500':    line.includes('ERROR') || line.includes('Error') || line.includes('PHP Fatal') || line.includes('PHP Warning'),
            'text-yellow-600 dark:text-yellow-400': line.includes('WARNING') || line.includes('Warning') || line.includes('PHP Notice'),
            'text-gray-600 dark:text-gray-400':   !line.includes('ERROR') && !line.includes('Error') && !line.includes('WARNING') && !line.includes('Warning')
          }"
          x-text="line"
        ></div>
      </template>
    </div>
  </div>

<script>
function lerdApp() {
  return {
    theme: localStorage.getItem('lerd-theme') || 'auto',
    tab: 'sites',
    sites: [],
    sitesLoading: false,
    phpVersions: [],
    nodeVersions: [],
    services: [],
    servicesLoading: false,
    systemStatus: {},
    statusLoading: false,
    version: {
      current: '...',
      latest: '',
      hasUpdate: false,
      checked: false,
      checking: false,
    },
    _statusInterval: null,
    _sitesInterval: null,
    _sitesLoaded: false,
    nodeInstall: { version: '', installing: false, error: '', done: false },
    autostartEnabled: false,
    autostartLoading: false,
    xdebugEnabled: {},
    xdebugLoading: {},
    logs: {
      open: false,
      container: '',
      lines: [],
      connected: false,
      _source: null,
    },

    applyTheme(t) {
      const isDark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', isDark);
    },
    setTheme(t) {
      this.theme = t;
      localStorage.setItem('lerd-theme', t);
      this.applyTheme(t);
    },

    init() {
      this.applyTheme(this.theme);
      this.loadVersion();
      this.loadSettings();
      this.loadSites();
      this.loadPHPVersions();
      this.loadNodeVersions();
      this.loadServices();
      this.loadStatus();
      this._statusInterval = setInterval(() => {
        if (this.tab === 'system') this.loadStatus();
      }, 10000);
      this._sitesInterval = setInterval(() => {
        if (this.tab === 'sites') {
          this.loadSites();
          this.loadNodeVersions();
        }
      }, 5000);
    },

    capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); },
    serviceDashboard(name) {
      const dashboards = { mailpit: 'http://localhost:8025', minio: 'http://localhost:9001', meilisearch: 'http://localhost:7700' };
      return dashboards[name] || null;
    },

    async loadVersion() {
      try {
        const res = await fetch('/api/version');
        const data = await res.json();
        this.version.current = data.current || 'dev';
      } catch (_) {}
    },

    async checkVersion() {
      this.version.checking = true;
      try {
        const res = await fetch('/api/version');
        const data = await res.json();
        this.version.current = data.current || 'dev';
        this.version.latest = data.latest || '';
        this.version.hasUpdate = data.has_update || false;
        this.version.checked = true;
      } catch (_) {
        this.version.checked = true;
        this.version.hasUpdate = false;
      } finally {
        this.version.checking = false;
      }
    },

    async loadSites() {
      const firstLoad = !this._sitesLoaded;
      if (firstLoad) this.sitesLoading = true;
      try {
        const res = await fetch('/api/sites');
        const raw = await res.json();
        this._sitesLoaded = true;
        if (firstLoad) {
          this.sites = raw.map(s => ({ ...s, tlsLoading: false, tlsError: '', versionLoading: false, queueLoading: false, queueError: '', unlinkLoading: false }));
        } else {
          raw.forEach(s => {
            const e = this.sites.find(x => x.domain === s.domain);
            if (e) {
              e.php_version = s.php_version;
              e.node_version = s.node_version;
              e.tls = s.tls;
              e.fpm_running = s.fpm_running;
              e.queue_running = s.queue_running;
            } else {
              this.sites.push({ ...s, tlsLoading: false, tlsError: '', versionLoading: false, queueLoading: false, queueError: '', unlinkLoading: false });
            }
          });
          this.sites = this.sites.filter(e => raw.some(s => s.domain === e.domain));
        }
      } catch (_) {
        if (firstLoad) this.sites = [];
      } finally {
        if (firstLoad) this.sitesLoading = false;
      }
    },

    async loadServices() {
      this.servicesLoading = true;
      try {
        const res = await fetch('/api/services');
        const data = await res.json();
        this.services = data.map(s => ({ ...s, loading: false, copied: false, flash: '', error: '', logs: '', showEnv: false }));
      } catch (_) {
        this.services = [];
      } finally {
        this.servicesLoading = false;
      }
    },

    async toggleService(svc, action) {
      svc.loading = true;
      svc.error = '';
      svc.logs = '';
      svc.flash = '';
      try {
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST' });
        const data = await res.json();
        svc.status = data.status;
        svc.env_vars = data.env_vars;
        if (data.ok) {
          svc.flash = action === 'start' ? 'Started successfully' : 'Stopped';
          setTimeout(() => { svc.flash = ''; }, 3000);
        } else {
          svc.error = data.error || 'Unknown error';
          svc.logs = data.logs || '';
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
      }
    },

    envPreview(svc) {
      return Object.entries(svc.env_vars || {}).map(([k, v]) => `${k}=${v}`).join('\n');
    },

    async copyEnvVars(svc) {
      const text = this.envPreview(svc);
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      svc.copied = true;
      setTimeout(() => { svc.copied = false; }, 2000);
    },

    async loadPHPVersions() {
      try {
        const res = await fetch('/api/php-versions');
        this.phpVersions = await res.json();
      } catch (_) {}
    },

    async loadNodeVersions() {
      try {
        const res = await fetch('/api/node-versions');
        this.nodeVersions = await res.json();
      } catch (_) {}
    },

    async installNodeVersion() {
      const v = this.nodeInstall.version.trim();
      if (!v) return;
      this.nodeInstall.installing = true;
      this.nodeInstall.error = '';
      this.nodeInstall.done = false;
      try {
        const res = await fetch(`/api/node-versions/install?version=${encodeURIComponent(v)}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.nodeInstall.done = true;
          this.nodeInstall.version = '';
          setTimeout(() => { this.nodeInstall.done = false; }, 3000);
          await this.loadNodeVersions();
        } else {
          this.nodeInstall.error = data.error || 'Install failed';
        }
      } catch (e) {
        this.nodeInstall.error = e.message || 'Request failed';
      } finally {
        this.nodeInstall.installing = false;
      }
    },

    async setSiteVersion(site, type, version) {
      if (!version) return;
      site.versionLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/${type}?version=${encodeURIComponent(version)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) await this.loadSites();
      } catch (_) {
        await this.loadSites();
      } finally {
        site.versionLoading = false;
      }
    },

    openSite(site) {
      const protocol = site.tls ? 'https' : 'http';
      // Append a cache-buster for HTTP sites so the browser doesn't serve a
      // previously cached 301 redirect to the HTTPS version.
      const bust = site.tls ? '' : `?_=${Date.now()}`;
      window.open(`${protocol}://${site.domain}${bust}`, '_blank', 'noopener');
    },

    async toggleTLS(site) {
      site.tlsLoading = true;
      site.tlsError = '';
      const action = site.tls ? 'unsecure' : 'secure';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.tls = !site.tls;
        } else {
          site.tlsError = data.error || 'Failed';
        }
      } catch (e) {
        site.tlsError = e.message || 'Request failed';
      } finally {
        site.tlsLoading = false;
      }
    },

    async toggleQueue(site) {
      site.queueLoading = true;
      site.queueError = '';
      const action = site.queue_running ? 'queue:stop' : 'queue:start';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.queue_running = !site.queue_running;
        } else {
          site.queueError = data.error || 'Failed';
        }
      } catch (e) {
        site.queueError = e.message || 'Request failed';
      } finally {
        site.queueLoading = false;
      }
    },

    async unlinkSite(site) {
      if (!confirm(`Unlink ${site.domain}? The site will stop being served by nginx.`)) return;
      site.unlinkLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/unlink`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.sites = this.sites.filter(s => s.domain !== site.domain);
        } else {
          alert('Unlink failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Unlink failed: ' + (e.message || 'Request failed'));
      } finally {
        site.unlinkLoading = false;
      }
    },

    fpmContainer(site) {
      if (!site.php_version) return '';
      return 'lerd-php' + site.php_version.replace('.', '') + '-fpm';
    },

    openLogs(site) {
      const container = this.fpmContainer(site);
      if (!container) return;
      if (this.logs.open && this.logs.container === container) {
        this.closeLogs();
        return;
      }
      this.closeLogs();
      this.logs.container = container;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;

      const src = new EventSource(`/api/logs/${container}`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.logScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    openQueueLogs(site) {
      const label = `queue:${site.name}`;
      if (this.logs.open && this.logs.container === label) {
        this.closeLogs();
        return;
      }
      this.closeLogs();
      this.logs.container = label;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;

      const src = new EventSource(`/api/queue/${site.name}/logs`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.logScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    closeLogs() {
      if (this.logs._source) { this.logs._source.close(); this.logs._source = null; }
      this.logs.open = false;
      this.logs.connected = false;
    },

    clearLogs() { this.logs.lines = []; },

    fpmRunning(v) {
      const fpms = (this.systemStatus && this.systemStatus.php_fpms) || [];
      const fpm = fpms.find(f => f.version === v);
      return fpm ? fpm.running : false;
    },

    async loadStatus() {
      this.statusLoading = (Object.keys(this.systemStatus).length === 0);
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        this.systemStatus = data;
        const next = { ...this.xdebugEnabled };
        (data.php_fpms || []).forEach(fpm => {
          if (!this.xdebugLoading[fpm.version]) {
            next[fpm.version] = fpm.xdebug_enabled;
          }
        });
        this.xdebugEnabled = next;
      } catch (_) {} finally {
        this.statusLoading = false;
      }
    },

    async loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        this.autostartEnabled = data.autostart_on_login || false;
      } catch (_) {}
    },

    async toggleXdebug(version) {
      const current = !!this.xdebugEnabled[version];
      const action = current ? 'off' : 'on';
      this.xdebugEnabled = { ...this.xdebugEnabled, [version]: !current };
      this.xdebugLoading = { ...this.xdebugLoading, [version]: true };
      try {
        const res = await fetch(`/api/xdebug/${version}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
      } catch (_) {
        this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
      } finally {
        this.xdebugLoading = { ...this.xdebugLoading, [version]: false };
      }
    },

    async toggleAutostart() {
      this.autostartLoading = true;
      try {
        const res = await fetch('/api/settings/autostart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: !this.autostartEnabled }),
        });
        const data = await res.json();
        if (data.ok) this.autostartEnabled = !this.autostartEnabled;
      } catch (_) {} finally {
        this.autostartLoading = false;
      }
    },
  };
}
</script>
