    setSiteLogsTab(tab) {
      this.siteLogsTab = tab;
      const s = this.selectedSite;
      this.closeSiteQueueLogs();
      this.closeSiteStripeLogs();
      this.closeSiteScheduleLogs();
      this.closeSiteReverbLogs();
      this.closeSiteWorkerLogs();
      if (tab === 'queue' && s) this.openSiteQueueLogs(s);
      else if (tab === 'stripe' && s) this.openSiteStripeLogs(s);
      else if (tab === 'schedule' && s) this.openSiteScheduleLogs(s);
      else if (tab === 'reverb' && s) this.openSiteReverbLogs(s);
      else if (tab.startsWith('worker:') && s) this.openSiteWorkerLogs(s, tab.slice(7));
    },

    async loadServices() {
      if (this.services.length === 0) this.servicesLoading = true;
      try {
        const res = await fetch('/api/services');
        const data = await res.json();
        this.services = data.map(s => ({ ...s, loading: false, copied: false, flash: '', error: '' }));
      } catch (_) {
        this.services = [];
      } finally {
        this.servicesLoading = false;
      }
    },

    selectService(svc) {
      this.selectedSvc = svc.name;
      this.svcDetailTab = 'logs';
      this.openServiceLogs(svc);
    },

    openServiceLogs(svc) {
      if (this.svcLogs._source) {
        this.svcLogs._source.close();
        this.svcLogs._source = null;
      }
      this.svcLogs.lines = [];
      this.svcLogs.connected = false;
      if (svc.status !== 'active') return;
      const url = svc.queue_site
        ? `/api/queue/${svc.queue_site}/logs`
        : svc.stripe_listener_site
          ? `/api/stripe/${svc.stripe_listener_site}/logs`
          : svc.schedule_worker_site
            ? `/api/schedule/${svc.schedule_worker_site}/logs`
            : svc.reverb_site
              ? `/api/reverb/${svc.reverb_site}/logs`
              : svc.worker_site
                ? `/api/worker/${svc.worker_site}/${svc.worker_name}/logs`
                : `/api/logs/lerd-${svc.name}`;
      const src = new EventSource(url);
      this.svcLogs._source = src;
      src.onopen = () => { this.svcLogs.connected = true; };
      src.onerror = () => { this.svcLogs.connected = false; };
      src.onmessage = (e) => {
        this.svcLogs.lines.push(e.data);
        if (this.svcLogs.lines.length > 500) this.svcLogs.lines.splice(0, this.svcLogs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.svcLogScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    selectSystem(item) {
      if (this.systemLogs._source) {
        this.systemLogs._source.close();
        this.systemLogs._source = null;
      }
      this.systemLogs.lines = [];
      this.systemLogs.connected = false;
      this.selectedSystem = item;
      if (item === 'dns' && this.systemStatus.dns?.ok) this.openSystemLogs('lerd-dns');
      if (item === 'nginx' && this.systemStatus.nginx?.running) this.openSystemLogs('lerd-nginx');
      if (item === 'watcher') this.openWatcherLogs();
      if (item.startsWith('php-')) {
        const v = item.slice(4);
        if (this.fpmRunning(v)) this.openSystemLogs('lerd-php' + v.replace('.', '') + '-fpm');
      }
    },

    openSystemLogs(container) {
      if (this.systemLogs._source) {
        this.systemLogs._source.close();
        this.systemLogs._source = null;
      }
      this.systemLogs.lines = [];
      this.systemLogs.connected = false;
      const src = new EventSource(`/api/logs/${container}`);
      this.systemLogs._source = src;
      src.onopen = () => { this.systemLogs.connected = true; };
      src.onerror = () => { this.systemLogs.connected = false; };
      src.onmessage = (e) => {
        this.systemLogs.lines.push(e.data);
        if (this.systemLogs.lines.length > 500) this.systemLogs.lines.splice(0, this.systemLogs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.nginxLogScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    openWatcherLogs() {
      if (this.systemLogs._source) {
        this.systemLogs._source.close();
        this.systemLogs._source = null;
      }
      this.systemLogs.lines = [];
      this.systemLogs.connected = false;
      const src = new EventSource('/api/watcher/logs');
      this.systemLogs._source = src;
      src.onopen = () => { this.systemLogs.connected = true; };
      src.onerror = () => { this.systemLogs.connected = false; };
      src.onmessage = (e) => {
        this.systemLogs.lines.push(e.data);
        if (this.systemLogs.lines.length > 500) this.systemLogs.lines.splice(0, this.systemLogs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.watcherLogScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    async toggleService(svc, action) {
      svc.loading = true;
      svc.error = '';
      svc.flash = '';
      try {
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST' });
        const data = await res.json();
        svc.status = data.status;
        svc.env_vars = data.env_vars;
        if (data.ok) {
          // Queue/stripe/schedule/reverb workers disappear after stop — remove from list
          if ((svc.queue_site || svc.stripe_listener_site || svc.schedule_worker_site || svc.reverb_site) && action === 'stop') {
            if (this.svcLogs._source) { this.svcLogs._source.close(); this.svcLogs._source = null; }
            this.svcLogs.lines = [];
            this.svcLogs.connected = false;
            this.selectedSvc = null;
            this.services = this.services.filter(s => s.name !== svc.name);
            return;
          }
          svc.flash = action === 'start' ? 'Started successfully' : 'Stopped';
          setTimeout(() => { svc.flash = ''; }, 3000);
        } else {
          svc.error = data.error || 'Unknown error';
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
        if (this.selectedSvc === svc.name) this.openServiceLogs(svc);
      }
    },

    async toggleServicePin(svc) {
      const action = svc.pinned ? 'unpin' : 'pin';
      svc.loading = true;
      try {
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          svc.pinned = !svc.pinned;
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
      }
    },

    async removeService(svc) {
      if (!confirm(`Remove custom service "${svc.name}"?`)) return;
      svc.loading = true;
      try {
        const res = await fetch(`/api/services/${svc.name}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          if (this.selectedSvc === svc.name) {
            if (this.svcLogs._source) { this.svcLogs._source.close(); this.svcLogs._source = null; }
            this.svcLogs.lines = [];
            this.svcLogs.connected = false;
            this.selectedSvc = null;
          }
          this.services = this.services.filter(s => s.name !== svc.name);
        } else {
          svc.error = data.error || 'Remove failed';
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
      }
    },

    get selectedSite() {
      if (!this.selectedSiteDomain) return null;
      return this.sites.find(s => s.domain === this.selectedSiteDomain) || null;
    },

    get selectedService() {
      if (!this.selectedSvc) return null;
      return this.services.find(s => s.name === this.selectedSvc) || null;
    },

    get selectedPHPVersion() {
      if (!this.selectedSystem || !this.selectedSystem.startsWith('php-')) return null;
      const v = this.selectedSystem.slice(4);
      return this.phpVersions.includes(v) ? v : null;
    },

    get selectedNodeVersion() {
      if (!this.selectedSystem || !this.selectedSystem.startsWith('node-')) return null;
      const v = this.selectedSystem.slice(5);
      return this.nodeVersions.includes(v) ? v : null;
    },

    envPreview(svc) {
      return Object.entries(svc.env_vars || {}).map(([k, v]) => `${k}=${v}`).join('\n');
    },

    async copyEnvVars(svc) {
      const text = this.envPreview(svc);
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      svc.copied = true;
      setTimeout(() => { svc.copied = false; }, 2000);
    },

    async loadPHPVersions() {
      try {
        const res = await fetch('/api/php-versions');
        this.phpVersions = await res.json();
      } catch (_) {}
    },

    async loadNodeVersions() {
      try {
        const res = await fetch('/api/node-versions');
        this.nodeVersions = await res.json();
      } catch (_) {}
    },

    async installNodeVersion() {
      const v = this.nodeInstall.version.trim();
      if (!v) return;
      this.nodeInstall.installing = true;
      this.nodeInstall.error = '';
      this.nodeInstall.done = false;
      try {
        const res = await fetch(`/api/node-versions/install?version=${encodeURIComponent(v)}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.nodeInstall.done = true;
          this.nodeInstall.version = '';
          setTimeout(() => { this.nodeInstall.done = false; }, 3000);
          await this.loadNodeVersions();
        } else {
          this.nodeInstall.error = data.error || 'Install failed';
        }
      } catch (e) {
        this.nodeInstall.error = e.message || 'Request failed';
      } finally {
        this.nodeInstall.installing = false;
      }
    },

    async setSiteVersion(site, type, version) {
      if (!version) return;
      site.versionLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/${type}?version=${encodeURIComponent(version)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) await this.loadSites();
      } catch (_) {
        await this.loadSites();
      } finally {
        site.versionLoading = false;
      }
    },

    openSite(site) {
      const protocol = site.tls ? 'https' : 'http';
      // Append a cache-buster for HTTP sites so the browser doesn't serve a
      // previously cached 301 redirect to the HTTPS version.
      const bust = site.tls ? '' : `?_=${Date.now()}`;
      window.open(`${protocol}://${site.domain}${bust}`, '_blank', 'noopener');
    },

    openWorktree(wt) {
      window.open('http://' + wt.domain, '_blank', 'noopener');
    },

    async toggleTLS(site) {
      site.tlsLoading = true;
      site.tlsError = '';
      const action = site.tls ? 'unsecure' : 'secure';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.tls = !site.tls;
        } else {
          site.tlsError = data.error || 'Failed';
        }
      } catch (e) {
        site.tlsError = e.message || 'Request failed';
      } finally {
        site.tlsLoading = false;
      }
    },

    async toggleQueue(site) {
      site.queueLoading = true;
      site.queueError = '';
      const stopping = site.queue_running;
      const action = stopping ? 'queue:stop' : 'queue:start';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.queue_running = !stopping;
          if (stopping) {
            // Close stale log drawer stream if open for this queue
            if (this.logs.open && this.logs.container === `queue:${site.name}`) {
              this.closeLogs();
            }
            // Close site queue logs panel and return to FPM tab
            this.closeSiteQueueLogs();
            this.siteLogsTab = 'fpm';
          } else {
            // Queue just started — switch to Queue tab and begin streaming
            this.siteLogsTab = 'queue';
            this.openSiteQueueLogs(site);
          }
          // Refresh services list so queue worker appears/disappears
          await this.loadServices();
        } else {
          site.queueError = data.error || 'Failed';
        }
      } catch (e) {
        site.queueError = e.message || 'Request failed';
      } finally {
        site.queueLoading = false;
      }
    },

    async toggleHorizon(site) {
      site.horizonLoading = true;
      site.horizonError = '';
      const stopping = site.horizon_running;
      const action = stopping ? 'horizon:stop' : 'horizon:start';
      try {
        const res = await fetch(`/api/sites/${site.domain}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.horizon_running = !stopping;
          if (stopping) {
            this.closeSiteHorizonLogs();
            this.siteLogsTab = 'fpm';
          } else {
            this.siteLogsTab = 'horizon';
            this.openSiteHorizonLogs(site);
          }
          await this.loadServices();
        } else {
          site.horizonError = data.error || 'Failed';
        }
      } catch (e) {
        site.horizonError = e.message || 'Request failed';
      } finally {
        site.horizonLoading = false;
      }
    },

    async unlinkSite(site) {
      if (!confirm(`Unlink ${site.domain}? The site will stop being served by nginx.`)) return;
      site.unlinkLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/unlink`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          if (this.selectedSiteDomain === site.domain) {
            this.selectedSiteDomain = null;
            if (this.siteLogs._source) { this.siteLogs._source.close(); this.siteLogs._source = null; }
            this.closeSiteQueueLogs();
            this.closeSiteHorizonLogs();
            this.closeSiteStripeLogs();
            this.closeSiteScheduleLogs();
            this.closeSiteReverbLogs();
            this.siteLogsTab = 'fpm';
          }
          this.sites = this.sites.filter(s => s.domain !== site.domain);
        } else {
          alert('Unlink failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Unlink failed: ' + (e.message || 'Request failed'));
      } finally {
        site.unlinkLoading = false;
      }
    },

    async pauseSite(site) {
      site.pauseLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/pause`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.paused = true;
        } else {
          alert('Pause failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Pause failed: ' + (e.message || 'Request failed'));
      } finally {
        site.pauseLoading = false;
      }
    },

    async resumeSite(site) {
      site.pauseLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/unpause`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          site.paused = false;
        } else {
          alert('Resume failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Resume failed: ' + (e.message || 'Request failed'));
      } finally {
        site.pauseLoading = false;
      }
    },

    async openTerminal(site) {
      try {
        const res = await fetch(`/api/sites/${site.domain}/terminal`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) alert('Could not open terminal: ' + (data.error || 'Unknown error'));
      } catch (e) {
        alert('Could not open terminal: ' + (e.message || 'Request failed'));
      }
    },

    fpmContainer(site) {
      if (!site.php_version) return '';
      return 'lerd-php' + site.php_version.replace('.', '') + '-fpm';
    },

    openLogs(site) {
      const container = this.fpmContainer(site);
      if (!container) return;
      if (this.logs.open && this.logs.container === container) {
        this.closeLogs();
        return;
      }
      this.closeLogs();
      this.logs.container = container;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;

      const src = new EventSource(`/api/logs/${container}`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.logScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    openQueueLogs(site) {
      const label = `queue:${site.name}`;
      if (this.logs.open && this.logs.container === label) {
        this.closeLogs();
        return;
      }
      this.closeLogs();
      this.logs.container = label;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;

      const src = new EventSource(`/api/queue/${site.name}/logs`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => {
          const el = this.$refs.logScroll;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    closeLogs() {
      if (this.logs._source) { this.logs._source.close(); this.logs._source = null; }
      this.logs.open = false;
      this.logs.connected = false;
    },

    clearLogs() { this.logs.lines = []; },

    async setPHPDefault(version) {
      this.phpDefaultLoading = true;
      try {
        const res = await fetch(`/api/php-versions/${version}/set-default`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) this.systemStatus = { ...this.systemStatus, php_default: data.php_default };
      } catch (_) {}
      finally { this.phpDefaultLoading = false; }
    },

    async setNodeDefault(version) {
      this.nodeDefaultLoading = true;
      try {
        const res = await fetch(`/api/node-versions/${version}/set-default`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) this.systemStatus = { ...this.systemStatus, node_default: data.node_default };
      } catch (_) {}
      finally { this.nodeDefaultLoading = false; }
    },

    phpSiteCount(v) {
      return this.sites.filter(s => s.php_version === v).length;
    },

    nodeSiteCount(v) {
      const nodeDefault = this.systemStatus && this.systemStatus.node_default;
      return this.sites.filter(s => {
        if (s.node_version === v) return true;
        if (!s.node_version && v === nodeDefault) return true;
        return false;
      }).length;
    },

    async removePHPVersion(version) {
      this.phpRemoveLoading = { ...this.phpRemoveLoading, [version]: true };
      this.phpRemoveError = { ...this.phpRemoveError, [version]: '' };
      try {
        const res = await fetch(`/api/php-versions/${version}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.phpVersions = this.phpVersions.filter(v => v !== version);
          this.selectedSystem = null;
          await this.loadStatus();
        } else {
          this.phpRemoveError = { ...this.phpRemoveError, [version]: data.error || 'Remove failed' };
        }
      } catch (e) {
        this.phpRemoveError = { ...this.phpRemoveError, [version]: e.message || 'Request failed' };
      } finally {
        this.phpRemoveLoading = { ...this.phpRemoveLoading, [version]: false };
      }
    },

    async removeNodeVersion(version) {
      this.nodeRemoveLoading = { ...this.nodeRemoveLoading, [version]: true };
      this.nodeRemoveError = { ...this.nodeRemoveError, [version]: '' };
      try {
        const res = await fetch(`/api/node-versions/${version}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.nodeVersions = this.nodeVersions.filter(v => v !== version);
          this.selectedSystem = null;
        } else {
          this.nodeRemoveError = { ...this.nodeRemoveError, [version]: data.error || 'Remove failed' };
        }
      } catch (e) {
        this.nodeRemoveError = { ...this.nodeRemoveError, [version]: e.message || 'Request failed' };
      } finally {
        this.nodeRemoveLoading = { ...this.nodeRemoveLoading, [version]: false };
      }
    },

    fpmRunning(v) {
      const fpms = (this.systemStatus && this.systemStatus.php_fpms) || [];
      const fpm = fpms.find(f => f.version === v);
      return fpm ? fpm.running : false;
    },

    get allCoreRunning() {
      return !!(this.systemStatus.dns?.ok &&
        this.systemStatus.nginx?.running &&
        (this.systemStatus.php_fpms || []).every(f => f.running));
    },

    async lerdStart() {
      this.lerdStarting = true;
      try {
        await fetch('/api/lerd/start', { method: 'POST' });
        await Promise.all([this.loadStatus(), this.loadServices(), this.loadSites()]);
      } catch (_) {} finally { this.lerdStarting = false; }
    },

    async lerdStop() {
      this.lerdStopping = true;
      try {
        await fetch('/api/lerd/stop', { method: 'POST' });
        await Promise.all([this.loadStatus(), this.loadServices(), this.loadSites()]);
      } catch (_) {} finally { this.lerdStopping = false; }
    },

    async startWatcher() {
      this.watcherStarting = true;
      try {
        await fetch('/api/watcher/start', { method: 'POST' });
        await this.loadStatus();
        if (this.systemStatus.watcher_running) this.openWatcherLogs();
      } catch (_) {} finally { this.watcherStarting = false; }
    },

    async loadStatus() {
      this.statusLoading = (Object.keys(this.systemStatus).length === 0);
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        this.systemStatus = data;
        const next = { ...this.xdebugEnabled };
        (data.php_fpms || []).forEach(fpm => {
          if (!this.xdebugLoading[fpm.version]) {
            next[fpm.version] = fpm.xdebug_enabled;
          }
        });
        this.xdebugEnabled = next;
      } catch (_) {} finally {
        this.statusLoading = false;
      }
    },

    async loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        this.autostartEnabled = data.autostart_on_login || false;
      } catch (_) {}
    },

    async toggleXdebug(version) {
      const current = !!this.xdebugEnabled[version];
      const action = current ? 'off' : 'on';
      this.xdebugEnabled = { ...this.xdebugEnabled, [version]: !current };
      this.xdebugLoading = { ...this.xdebugLoading, [version]: true };
      try {
        const res = await fetch(`/api/xdebug/${version}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
      } catch (_) {
        this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
      } finally {
        this.xdebugLoading = { ...this.xdebugLoading, [version]: false };
      }
    },

    async toggleAutostart() {
      this.autostartLoading = true;
      try {
        const res = await fetch('/api/settings/autostart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: !this.autostartEnabled }),
        });
        const data = await res.json();
        if (data.ok) this.autostartEnabled = !this.autostartEnabled;
      } catch (_) {} finally {
        this.autostartLoading = false;
      }
    },
  };
}
</script>
</body>
</html>
